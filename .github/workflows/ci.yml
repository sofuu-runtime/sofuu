name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-arm64
          - os: ubuntu-22.04
            label: Linux-x86_64
          - os: ubuntu-22.04-arm
            label: Linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcurl4-openssl-dev cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install curl cmake ninja

      - name: Build libuv
        run: |
          cd deps/libuv
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF
          cmake --build build

      - name: Build Sofuu
        run: make

      - name: Print binary info
        run: |
          ls -lh sofuu
          file sofuu
          ./sofuu version

      - name: Run test suite
        run: make test

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sofuu-${{ matrix.label }}
          path: sofuu
          retention-days: 7
